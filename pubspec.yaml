name: nutrition_app
description: "Beslenmenin Arkadaşı - AI destekli beslenme uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any

  # File Picker
  file_picker: ^8.0.0
  
  # UI & Fonts
  google_fonts: ^7.0.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  
  # State Management
  provider: ^6.1.1
  
  # Animations
  flutter_animate: ^4.5.0
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5

  # Social Auth
  google_sign_in: ^6.2.1

  # AI
  http: ^1.2.0

  # Health & Fitness (Health Connect - Android)
  health: ^13.2.0

  # PDF
  syncfusion_flutter_pdf: ^28.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/lottie/
    - assets/animations/